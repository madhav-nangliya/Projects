<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LanSentry — Network Dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />

  <!--
    Chart.js — JavaScript library for drawing charts
    We load it from cdnjs (a free public library host)
    This gives us bar charts, line charts, pie charts etc
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

  <!-- ══════════════════════════════════
       NAVBAR — top navigation bar
       Shown on every page (base template)
  ══════════════════════════════════ -->
  <nav class="navbar">

    <!-- Brand Logo + Name -->
    <a class="navbar-brand" href="/">
      <div class="logo-icon">🛡️</div>
      <h1>Lan<span>Sentry</span></h1>
    </a>

    <!-- Desktop Navigation Links -->
    <ul class="nav-links">
      <li><a href="/"        id="nav-home">🏠 Home</a></li>
      <li><a href="/devices" id="nav-devices">📡 Devices</a></li>
      <li><a href="/alerts"  id="nav-alerts">
        🚨 Alerts
        <!-- Alert badge — shows count, hidden when 0 alerts -->
        <span class="alert-badge" id="alert-count" style="display:none">0</span>
      </a></li>
      <li><a href="/history" id="nav-history">🕐 History</a></li>
    </ul>

    <!-- Right side — Status indicator + Theme toggle + Hamburger -->
    <div class="nav-right">

      <!-- Green dot showing network is active -->
      <div class="network-status">
        <div class="status-dot"></div>
        Network Active
      </div>

      <!-- Dark/Light mode toggle button -->
      <button class="theme-toggle" id="theme-toggle" title="Toggle dark/light mode">
        <div class="toggle-knob" id="toggle-knob">🌙</div>
      </button>

      <!-- Hamburger menu button (mobile only) -->
      <button class="hamburger" id="hamburger" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </div>
  </nav>

  <!-- Mobile Navigation Drawer (slides down on hamburger click) -->
  <div class="mobile-nav" id="mobile-nav">
    <a href="/">🏠 Home</a>
    <a href="/devices">📡 Devices</a>
    <a href="/alerts">🚨 Alerts</a>
    <a href="/history">🕐 History</a>
  </div>

  <!-- ══════════════════════════════════
       PAGE CONTENT
       Each page fills this section via {% block content %}
  ══════════════════════════════════ -->
  <div class="container">
    {% block content %}{% endblock %}
  </div>

  <!-- Toast notification container (bottom right corner) -->
  <div class="toast-container" id="toast-container"></div>

  <!-- ══════════════════════════════════
       GLOBAL JAVASCRIPT
       Runs on every page
  ══════════════════════════════════ -->
  <script>

    // ── Theme Toggle (Dark / Light Mode) ──

    const body        = document.body;
    const themeToggle = document.getElementById('theme-toggle');
    const toggleKnob  = document.getElementById('toggle-knob');

    // Load saved theme from browser's localStorage
    // localStorage persists across page refreshes
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
      body.classList.add('light-mode');
      toggleKnob.textContent = '☀️';  // Show sun icon in light mode
    }

    // When toggle is clicked, switch theme
    themeToggle.addEventListener('click', () => {
      body.classList.toggle('light-mode'); // Add/remove 'light-mode' class

      const isLight = body.classList.contains('light-mode');
      toggleKnob.textContent = isLight ? '☀️' : '🌙';  // Update icon

      // Save preference so it persists after refresh
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
    });


    // ── Hamburger Menu (Mobile) ──

    const hamburger = document.getElementById('hamburger');
    const mobileNav = document.getElementById('mobile-nav');

    // Toggle mobile nav open/closed
    hamburger.addEventListener('click', () => {
      mobileNav.classList.toggle('open');
    });

    // Close mobile nav when any link is clicked
    mobileNav.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        mobileNav.classList.remove('open');
      });
    });


    // ── Active Nav Link Highlighting ──
    // Adds 'active' class to the current page's nav link

    const path = window.location.pathname;
    if (path === '/')          document.getElementById('nav-home').classList.add('active');
    if (path === '/devices')   document.getElementById('nav-devices').classList.add('active');
    if (path === '/alerts')    document.getElementById('nav-alerts').classList.add('active');
    if (path.startsWith('/history')) document.getElementById('nav-history').classList.add('active');


    // ── Toast Notification System ──
    // showToast() can be called from any page to show a popup message

    function showToast(message, type = 'info', duration = 3000) {
      const container = document.getElementById('toast-container');

      // Emoji icons for each toast type
      const icons = { success: '✅', error: '❌', info: 'ℹ️' };

      // Create the toast element
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span>${icons[type]}</span><span>${message}</span>`;

      // Add to page
      container.appendChild(toast);

      // Auto-remove after 'duration' milliseconds
      setTimeout(() => {
        toast.style.animation = 'toastOut 0.3s ease forwards';
        setTimeout(() => toast.remove(), 300);
      }, duration);
    }


    // ── Alert Badge in Navbar ──
    // Checks API every 30 seconds and shows count if there are alerts

    function updateAlertBadge() {
      fetch('/api/alerts')
        .then(r => r.json())
        .then(alerts => {
          const badge = document.getElementById('alert-count');
          if (alerts.length > 0) {
            badge.textContent = alerts.length;  // Show count
            badge.style.display = 'inline';     // Make visible
          } else {
            badge.style.display = 'none';       // Hide if no alerts
          }
        })
        .catch(() => {}); // Silently ignore errors
    }

    // Run immediately and then every 30 seconds
    updateAlertBadge();
    setInterval(updateAlertBadge, 30000);

  </script>

  <!-- Page-specific scripts go here -->
  {% block scripts %}{% endblock %}

</body>
</html>

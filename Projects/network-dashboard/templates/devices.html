{% extends "base.html" %}

{% block content %}

<div class="table-container">
    <h2>Connected Devices</h2>

    <table>
        <tr>
            <th>IP Address</th>
            <th>Hostname</th>
            <th>MAC Address</th>
            <th>Status</th>
        </tr>

        {% for device in devices %}
        <tr>
            <td>{{ device.ip }}</td>
            <td>{{ device.hostname }}</td>
            <td>{{ device.mac }}</td>
            <td>
                <span class="badge badge-online">● Online</span>
            </td>
        </tr>
        {% endfor %}

    </table>
</div>

{% endblock %}
